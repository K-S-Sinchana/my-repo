<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My First Repository</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #f8f1ff, #e0f7ff, #fff8e6);
      font-family: 'Times New Roman', Times, serif;
    }

    .message-box {
      width: 320px;
      padding: 30px;
      border-radius: 18px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
      background: linear-gradient(135deg, rgba(255, 203, 255, 0.9), rgba(203, 255, 241, 0.9), rgba(255, 245, 203, 0.9));
      text-align: center;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 1.8rem;
      color: #4b2c83;
    }

    p {
      margin: 0;
      font-size: 1rem;
      color: #333;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="message-box">
    <h2>Hello Goodwall</h2>
    <p>This is my first repository</p>
  </div>

  <script>
    // Optional JavaScript for beginner use
    const box = document.querySelector('.message-box');
    box.addEventListener('mouseover', () => {
      box.style.transform = 'scale(1.03)';
    });
    box.addEventListener('mouseout', () => {
      box.style.transform = 'scale(1)';
    });
  </script>
</body>
</html>
